# Stage Metadata for Chub
# ============================================

# The name of the stage (required!)
project_name: "my-zombie-stage"

# A short tagline to show in search
tagline: "Zombie RPG with body mods and clown equipment"

# Visibility: 'PUBLIC', 'PRIVATE', or 'UNLISTED'
visibility: 'PRIVATE'

# Position: 'ADJACENT' (default) | 'NONE' | 'COVER' | 'FULLSCREEN'
# ADJACENT - shows on the side (desktop) or top (mobile)
# NONE - runs in background, not visible
# COVER - covers chat history but leaves text input
# FULLSCREEN - takes over the whole screen
position: 'ADJACENT'

# Tags for discoverability
tags:
  - 'RPG'

# The schema for user-supplied config (optional)
config_schema:
  type: object
  properties:
    startingGold:
      type: integer
      default: 50
    startingHealth:
      type: integer
      default: 100
    startingStamina:
      type: integer
      default: 50

# State schema (for future optimization)
state_schema:
  init:
    type: object
    properties: {}
  message:
    type: object
    properties:
      health:
        type: integer
      gold:
        type: integer
      inventory:
        type: array
        items:
          type: string
  chat:
    type: object
    properties: {}

# Publish anonymously (optional)
# is_anonymous: false

# Disable ratings (optional)
# ratings_disabled: false

# extension_id is automatically generated - DO NOT SET
# github_path will be added automatically
github_path: 'https://github.com/Poniky/my-zombie-stage'


extension_id: 'my-zombie-stage-c2c253be32ed'

